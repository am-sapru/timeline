<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up for Timeline</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-wrapper" id="main-wrapper">
        <div class="login-area">
            <div class="welcomeback">
               Create an account
            </div>
            <div class="logininputarea">
                <input type="text" name="username" id="username" placeholder="Username" autocomplete="off" autocorrect="off" spellcheck="false">
                <input type="password" name="password" id="password" placeholder="Password" autocomplete="off" autocorrect="off" spellcheck="false">
            </div>
            <div class="submitbutton" id="submitbutton">
                <button>Submit</button>
            </div>
            <div id="errormessage">&nbsp;</div>
        </div>
    </div>

    <script src="scripts.js" type="module"></script>
</body>
</html>
