<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timeline</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="main-wrapper">
        <div class="topnav">
            <div class="logo" id="timelinelogo">
                <img src="logo.png" alt="TimeLine logo" aria-hidden="true" draggable="false">
            </div>
            <a download="schedule.tsc" href="#" id="saveeventsbutton">
                <div class="saveevents topnavbutton_var2">
                    Save
                </div>
            </a>
            <div class="openevents topnavbutton_var2" id="loadeventsfromfilebutton">
                Open
            </div>
            <div class="new topnavbutton" id="newbutton">
                New Event
            </div>
            <div class="resetevents topnavbutton" id="reseteventsbutton">
                Clear Events
            </div>
            <button id="openaccdialog">
                <div class="account-button">
                    <img src="accicon.png" alt="Account Settings" draggable="false">
                </div>
            </button>
        </div>
        <div class="eventsareawrapper">
            <div class="eventsarea" id="eventsarea">
                <div class="noevents"><i>Click "New Event" to start...</i></div>
            </div>
        </div>
        <div class="dialog-wrapper">
            <dialog id="accdialog">
                <button id="exitaccdialog" class="dialogexitbutton">
                    <h3>&times;</h3>
                </button>
                <br>
                <br>
                <div id="accmessage"></div>
            </dialog>
        </div>
        <div class="newdialogwrapper">
            <dialog id="newdialog">
                <button id="exitnewdialog" class="dialogexitbutton">
                    <h3>&times;</h3>
                </button>
                <br>
                <br>
                <input type="text" name="nameofevent" class="neweventinput" id="nameofevent" placeholder="Event Title"
                    spellcheck="false">
                <br>
                <input type="text" name="starttimeofevent" class="neweventinput" id="starttimeofevent"
                    placeholder="Start Time" spellcheck="false">
                <br>
                <input type="text" name="endtimeofevent" class="neweventinput" id="endtimeofevent"
                    placeholder="End Time" spellcheck="false">
                <br>
                <div id="submitneweventbuttonwrapper"><button id="submitnewevent">Create Event</button></div>
            </dialog>
        </div>
        <div class="deletealldialogwrapper">
            <dialog id="deletealldialog">
                <button id="exitdeletealldialog" class="dialogexitbutton">
                    <h3>&times;</h3>
                </button>
                <br>
                <br>
                <div class="messagefordeletealldialog">
                    Are you sure you want to delete everything?<br><br>
                </div>
                <button class="signup" id="deleteallyes">Yes</button>
                <button class="signup" id="exitdeletealldialogcancel">Cancel</button>
            </dialog>
        </div>
        <div class="abouttimelinedialogwrapper">
            <dialog id="abouttimelinedialog">
                <button id="exitabouttimelinedialog" class="dialogexitbutton">
                    <h3>&times;</h3>
                </button>
                <br>
                <br>
                <h3>About Timeline</h3>
                Timeline was made by Ansel Sapru
            </dialog>
        </div>
        <div class="opendialogwrapper">
            <dialog id="opendialog">
                <button id="exitopendialog" class="dialogexitbutton">
                    <h3>&times;</h3>
                </button>
                <br>
                <br>
                <input type="file" name="filetoopen" id="filetoopen">
                <br>
                <button class="topnavbutton_var2" id="finalizeopendialog">Open</button>
            </dialog>
        </div>
    </div>
    <script src="scripts_min.js" type="module"></script>
</body>

</html>
